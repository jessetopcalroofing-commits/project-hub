<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0c; --bg2: #111114; --bg3: #19191e;
    --surface: #151518; --surface2: #1c1c21;
    --border: rgba(255,255,255,0.05); --border2: rgba(255,255,255,0.1);
    --text: #f5f5f7; --text2: #9ca3af; --text3: #4b5563;
    --accent: #818cf8; --accent2: #6366f1; --accent-glow: rgba(99,102,241,0.12);
    --green: #34d399; --amber: #fbbf24; --red: #f87171;
    --radius: 14px; --radius-sm: 10px; --radius-xs: 6px;
  }
  [data-theme="light"] {
    --bg: #f8fafc; --bg2: #ffffff; --bg3: #f1f5f9;
    --surface: #ffffff; --surface2: #f1f5f9;
    --border: rgba(0,0,0,0.06); --border2: rgba(0,0,0,0.1);
    --text: #0f172a; --text2: #64748b; --text3: #94a3b8;
    --accent: #6366f1; --accent2: #4f46e5; --accent-glow: rgba(99,102,241,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { color: var(--accent2); }
  ::selection { background: var(--accent); color: #fff; }

  .app { display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  .sidebar { width: 250px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-logo { padding: 28px 22px 20px; }
  .sidebar-logo h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.03em; background: linear-gradient(135deg, var(--accent), #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .sidebar-logo p { font-size: 11px; color: var(--text3); margin-top: 5px; }
  .sidebar-nav { padding: 4px 12px; flex: 1; overflow-y: auto; }
  .nav-label { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; padding: 16px 8px 6px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; color: var(--text2); transition: all 0.15s; margin-bottom: 2px; font-weight: 500; }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent-glow); color: var(--accent); font-weight: 600; }
  .nav-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 6px currentColor; }
  .nav-count { margin-left: auto; font-size: 11px; color: var(--text3); font-weight: 500; }
  .sidebar-bottom { padding: 16px 12px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
  .btn-add { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 10px 14px; background: linear-gradient(135deg, var(--accent), #a78bfa); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit; }
  .btn-add:hover { transform: translateY(-1px); box-shadow: 0 4px 20px var(--accent-glow); filter: brightness(1.1); }
  .theme-toggle { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; border-radius: var(--radius-sm); cursor: pointer; font-size: 12px; color: var(--text3); border: 1px solid var(--border); background: none; width: 100%; transition: all 0.15s; font-family: inherit; }
  .theme-toggle:hover { background: var(--surface2); color: var(--text2); }
  .toggle-track { width: 28px; height: 16px; background: var(--border2); border-radius: 8px; position: relative; transition: background 0.2s; flex-shrink: 0; }
  .toggle-track.on { background: var(--accent); }
  .toggle-thumb { position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
  .toggle-track.on .toggle-thumb { transform: translateX(12px); }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
  .topbar { display: flex; align-items: center; gap: 16px; padding: 18px 28px; flex-shrink: 0; }
  .topbar h2 { font-size: 20px; font-weight: 700; flex-shrink: 0; letter-spacing: -0.03em; }
  .search-wrap { flex: 1; position: relative; max-width: 400px; }
  .search-wrap input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 9px 16px 9px 38px; font-size: 13px; color: var(--text); outline: none; transition: all 0.2s; font-family: inherit; }
  .search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .search-wrap input::placeholder { color: var(--text3); }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 13px; }
  .view-toggle { display: flex; gap: 2px; margin-left: auto; background: var(--surface); border-radius: 20px; padding: 3px; }
  .view-btn { background: none; border: none; border-radius: 16px; padding: 6px 14px; color: var(--text3); cursor: pointer; font-size: 12px; transition: all 0.15s; font-family: inherit; font-weight: 500; }
  .view-btn.active { background: var(--accent); color: #fff; }
  .content { flex: 1; overflow-y: auto; padding: 4px 28px 28px; }

  /* Stats */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 32px; }
  .stat-card { background: linear-gradient(135deg, var(--surface), var(--surface2)); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; position: relative; overflow: hidden; }
  .stat-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), #a78bfa); opacity: 0.5; }
  .stat-num { font-size: 32px; font-weight: 700; letter-spacing: -0.04em; }
  .stat-label { font-size: 12px; color: var(--text3); margin-top: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }

  /* Groups */
  .group-section { margin-bottom: 32px; }
  .group-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; cursor: pointer; user-select: none; }
  .group-dot-lg { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .group-title { font-size: 12px; font-weight: 700; color: var(--text2); letter-spacing: 0.06em; text-transform: uppercase; }
  .group-ct { font-size: 11px; color: var(--text3); font-weight: 500; }
  .chevron { color: var(--text3); font-size: 11px; margin-left: auto; transition: transform 0.2s; }
  .chevron.up { transform: rotate(-90deg); }

  /* Cards — completely new design */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 0; cursor: pointer; transition: all 0.25s; position: relative; overflow: hidden; }
  .card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.2); }
  .card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 8px 30px rgba(0,0,0,0.15); }
  .card-color-bar { height: 3px; width: 100%; }
  .card-inner { padding: 18px 18px 16px; }
  .card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .card-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .card-name { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; line-height: 1.3; }
  .card-desc { font-size: 12px; color: var(--text2); margin-top: 2px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-bottom { display: flex; align-items: center; gap: 6px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .card-host { font-size: 11px; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 4px; }
  .card-host-dot { width: 5px; height: 5px; border-radius: 50%; }
  .card-url-text { font-size: 11px; color: var(--text3); margin-left: auto; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-status { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.04em; }
  .card-status.active { background: rgba(52,211,153,0.1); color: var(--green); }
  .card-status.paused { background: rgba(251,191,36,0.1); color: var(--amber); }
  .card-status.archived { background: var(--surface2); color: var(--text3); }

  /* List view */
  .list-view .cards-grid { display: flex; flex-direction: column; gap: 4px; }
  .list-view .card { border-radius: var(--radius-sm); }
  .list-view .card:hover { transform: none; }
  .list-view .card-color-bar { display: none; }
  .list-view .card-inner { padding: 12px 16px; display: flex; align-items: center; gap: 14px; }
  .list-view .card-top { margin-bottom: 0; flex: 1; min-width: 0; }
  .list-view .card-icon { width: 32px; height: 32px; font-size: 16px; border-radius: 8px; }
  .list-view .card-desc { display: none; }
  .list-view .card-bottom { display: none; }

  /* Panel */
  .panel-overlay { position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); display: none; opacity: 0; transition: opacity 0.3s; }
  .panel-overlay.open { display: block; opacity: 1; }
  .panel { position: fixed; right: 0; top: 0; height: 100vh; width: 480px; background: var(--bg2); z-index: 51; transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.16,1,0.3,1); overflow-y: auto; display: flex; flex-direction: column; }
  .panel.open { transform: translateX(0); }

  .panel-hero { position: relative; padding: 32px 28px 24px; overflow: hidden; }
  .panel-hero-gradient { position: absolute; inset: 0; opacity: 0.08; }
  .panel-hero-close { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.08); border: none; color: var(--text2); font-size: 16px; cursor: pointer; padding: 8px 10px; border-radius: var(--radius-sm); transition: all 0.15s; z-index: 2; line-height: 1; backdrop-filter: blur(8px); }
  .panel-hero-close:hover { background: rgba(255,255,255,0.15); color: var(--text); }
  .panel-hero-content { position: relative; z-index: 1; }
  .panel-hero-icon { width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 16px; }
  .panel-hero-name { font-size: 22px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.2; }
  .panel-hero-meta { display: flex; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .panel-hero-desc { font-size: 14px; color: var(--text2); line-height: 1.6; margin-top: 12px; }

  .panel-section { padding: 0 28px 24px; }
  .panel-section-title { font-size: 10px; font-weight: 700; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }

  /* Panel action buttons */
  .panel-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .panel-act { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-decoration: none; border: none; font-family: inherit; }
  .panel-act:hover { text-decoration: none; transform: translateY(-1px); }
  .panel-act-open { background: var(--accent); color: #fff; }
  .panel-act-open:hover { background: var(--accent2); color: #fff; box-shadow: 0 4px 20px var(--accent-glow); }
  .panel-act-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .panel-act-secondary:hover { background: var(--bg3); border-color: var(--border2); color: var(--text); }

  /* Panel link cards */
  .panel-link { display: flex; align-items: center; gap: 14px; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 8px; text-decoration: none; color: var(--text); transition: all 0.2s; }
  .panel-link:hover { border-color: var(--accent); transform: translateX(4px); text-decoration: none; color: var(--text); box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
  .panel-link-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .panel-link-info { flex: 1; min-width: 0; }
  .panel-link-name { font-size: 13px; font-weight: 600; }
  .panel-link-url { font-size: 11px; color: var(--text3); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .panel-link-go { color: var(--text3); font-size: 18px; flex-shrink: 0; transition: all 0.15s; }
  .panel-link:hover .panel-link-go { color: var(--accent); transform: translateX(3px); }

  /* Panel detail pills */
  .panel-pills { display: flex; flex-wrap: wrap; gap: 8px; }
  .panel-pill { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px; flex: 1; min-width: 120px; }
  .panel-pill-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; margin-bottom: 4px; }
  .panel-pill-val { font-size: 13px; color: var(--text); font-weight: 500; word-break: break-all; }
  .panel-pill-full { flex-basis: 100%; }
  .panel-token { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px; color: var(--text3); word-break: break-all; cursor: pointer; transition: all 0.15s; }
  .panel-token:hover { border-color: var(--accent); color: var(--text2); }
  .panel-notes { font-size: 13px; color: var(--text2); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; line-height: 1.6; white-space: pre-wrap; }
  .tag { font-size: 10px; padding: 3px 8px; border-radius: var(--radius-xs); border: 1px solid var(--border); color: var(--text3); font-weight: 500; }
  .deps-wrap { display: flex; flex-wrap: wrap; gap: 6px; }

  .panel-footer { padding: 16px 28px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-shrink: 0; background: var(--bg2); }
  .btn { padding: 9px 18px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); transition: all 0.15s; background: none; color: var(--text2); font-family: inherit; }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-danger { color: var(--red); border-color: rgba(248,113,113,0.15); }
  .btn-danger:hover { background: rgba(248,113,113,0.06); }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 18px; width: 540px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 32px 64px rgba(0,0,0,0.4); }
  .modal-header { padding: 22px 26px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-size: 17px; font-weight: 700; letter-spacing: -0.02em; }
  .modal-close { background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; padding: 4px; }
  .modal-body { padding: 22px 26px; }
  .form-row { margin-bottom: 16px; }
  .form-label { font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.04em; }
  .form-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; color: var(--text); outline: none; transition: all 0.15s; font-family: inherit; }
  .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .form-input::placeholder { color: var(--text3); }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-footer { padding: 16px 26px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent2); }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 12px 20px; font-size: 13px; color: var(--text); z-index: 200; opacity: 0; transform: translateY(10px) scale(0.95); transition: all 0.3s; pointer-events: none; box-shadow: 0 12px 40px rgba(0,0,0,0.3); font-weight: 500; }
  .toast.show { opacity: 1; transform: translateY(0) scale(1); }
  .empty { text-align: center; padding: 80px 20px; color: var(--text3); font-size: 15px; }
  .loading { text-align: center; padding: 100px; color: var(--text3); font-size: 14px; }

  @media (max-width: 700px) {
    .sidebar { display: none; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .panel { width: 100%; }
    .panel-actions { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-logo">
      <h1>Project Hub</h1>
      <p>jesse.topcalroofing@gmail.com</p>
    </div>
    <div class="sidebar-nav">
      <div class="nav-label">Groups</div>
      <div class="nav-item active" onclick="setFilter('All', this)">
        <span style="font-size:15px">&#9776;</span> All Projects
        <span class="nav-count" id="nav-count-all">0</span>
      </div>
      <div id="group-nav"></div>
      <div class="nav-label" style="margin-top:8px">Status</div>
      <div class="nav-item" onclick="setStatusFilter('active', this)">
        <span class="nav-dot" style="color:var(--green);background:var(--green)"></span> Active
      </div>
      <div class="nav-item" onclick="setStatusFilter('paused', this)">
        <span class="nav-dot" style="color:var(--amber);background:var(--amber)"></span> Paused
      </div>
      <div class="nav-item" onclick="setStatusFilter('archived', this)">
        <span class="nav-dot" style="color:var(--text3);background:var(--text3)"></span> Archived
      </div>
    </div>
    <div class="sidebar-bottom">
      <button class="btn-add" onclick="openAddModal()">+ Add Project</button>
      <button class="theme-toggle" id="deploy-btn" onclick="triggerDeploy()" style="color:var(--accent)">
        <span id="deploy-label">&#9654; Deploy</span>
      </button>
      <button class="theme-toggle" onclick="toggleTheme()">
        <span id="theme-label">Light mode</span>
        <div class="toggle-track" id="toggle-track"><div class="toggle-thumb"></div></div>
      </button>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <h2 id="view-title">All Projects</h2>
      <div class="search-wrap">
        <span class="search-icon">&#128269;</span>
        <input type="text" id="search" placeholder="Search projects..." oninput="renderContent()" />
      </div>
      <div class="view-toggle">
        <button class="view-btn active" id="grid-btn" onclick="setView('grid')">Grid</button>
        <button class="view-btn" id="list-btn" onclick="setView('list')">List</button>
      </div>
    </div>
    <div class="content" id="content"><div class="loading">Loading...</div></div>
  </div>
</div>

<div class="panel-overlay" id="panel-overlay" onclick="closePanel()"></div>
<div class="panel" id="panel"></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Add Project</span>
      <button class="modal-close" onclick="closeModal()">&#10005;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const API="https://project-hub-api.jesse-topcalroofing.workers.dev";
const GC_KNOWN={"TopCal Roofing":"#1D9E75","Side Projects":"#818cf8","Political / Community":"#f59e0b"};
const GC_PALETTE=["#1D9E75","#818cf8","#f59e0b","#ec4899","#06b6d4","#8b5cf6","#ef4444","#14b8a6","#f97316","#a855f7"];
const GC_CACHE={};
function groupColor(g){if(GC_CACHE[g])return GC_CACHE[g];if(GC_KNOWN[g]){GC_CACHE[g]=GC_KNOWN[g];return GC_CACHE[g];}const used=Object.values(GC_CACHE);const avail=GC_PALETTE.filter(c=>!used.includes(c));GC_CACHE[g]=avail.length?avail[0]:GC_PALETTE[Object.keys(GC_CACHE).length%GC_PALETTE.length];return GC_CACHE[g];}

// Icon map — replaces ugly [bracket] icons with emoji
const ICON_MAP={"[ca]":"🇺🇸","[phone]":"📞","[vote]":"🗳️","[form]":"📋","[sheet]":"📊","[swap]":"🔄","[finance]":"💰","[focus]":"🎯","[corp]":"🏢","[hub]":"⚡","[skills]":"🎓","[vibe]":"🎵","[map]":"🗺️","[ops]":"📈","[jobs]":"💼","[onboard]":"👋","[web]":"🌐","[local]":"💻","[crm]":"📇","[ai]":"🤖","[scout]":"🔍","[?]":"📦"};
function icon(raw){return ICON_MAP[raw]||raw||'📦';}

const HT={"Cloudflare Pages":"cf","Cloudflare":"cf","Cloudflare (static)":"cf","Vercel":"vercel","Netlify":"netlify","Local":"local","Google Forms":"gdocs","Google Sheets":"gdocs"};
const HOST_COLORS={"cf":"#f6821f","vercel":"#fff","netlify":"#30c090","local":"#a78bfa","gdocs":"#4285f4"};
let projects=[],activeFilter="All",activeStatus=null,view="grid",selectedId=null,editingId=null,collapsed={};

function toggleTheme(){const h=document.documentElement,dark=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',dark?'light':'dark');document.getElementById('theme-label').textContent=dark?'Dark mode':'Light mode';document.getElementById('toggle-track').classList.toggle('on',!dark);localStorage.setItem('theme',dark?'light':'dark');}
function initTheme(){const s=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',s);document.getElementById('theme-label').textContent=s==='light'?'Dark mode':'Light mode';document.getElementById('toggle-track').classList.toggle('on',s==='light');}

async function load(){
  try{const r=await fetch(API+"/projects");projects=await r.json();updateCounts();renderContent();}
  catch(e){document.getElementById('content').innerHTML='<div class="empty">Could not connect to API.</div>';}
}
function updateCounts(){document.getElementById('nav-count-all').textContent=projects.length;renderGroupNav();}
function renderGroupNav(){
  const groups={};projects.forEach(p=>{groups[p.group_name]=(groups[p.group_name]||0)+1;});
  document.getElementById('group-nav').innerHTML=Object.entries(groups).map(([g,ct])=>{
    const color=groupColor(g),isActive=activeFilter===g?'active':'';
    return `<div class="nav-item ${isActive}" onclick="setFilter('${g.replace(/'/g,"\\'")}', this)"><span class="nav-dot" style="color:${color};background:${color}"></span> ${g}<span class="nav-count">${ct}</span></div>`;
  }).join('');
}
function getFiltered(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  return projects.filter(p=>{
    const mg=activeFilter==='All'||p.group_name===activeFilter;
    const ms=!activeStatus||p.status===activeStatus;
    const mq=!q||p.name.toLowerCase().includes(q)||(p.description||'').toLowerCase().includes(q)||(p.host||'').toLowerCase().includes(q);
    return mg&&ms&&mq;
  });
}
function setFilter(f,el){activeFilter=f;activeStatus=null;document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));if(el)el.classList.add('active');document.getElementById('view-title').textContent=f==='All'?'All Projects':f;renderContent();}
function setStatusFilter(s,el){activeFilter='All';activeStatus=s;document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));if(el)el.classList.add('active');document.getElementById('view-title').textContent=s.charAt(0).toUpperCase()+s.slice(1)+' Projects';renderContent();}
function setView(v){view=v;document.getElementById('grid-btn').classList.toggle('active',v==='grid');document.getElementById('list-btn').classList.toggle('active',v==='list');renderContent();}

function renderContent(){
  const filtered=getFiltered(),el=document.getElementById('content');
  if(!filtered.length){el.innerHTML='<div class="empty">No projects found.</div>';el.className='content';return;}
  const byGroup={};filtered.forEach(p=>{if(!byGroup[p.group_name])byGroup[p.group_name]=[];byGroup[p.group_name].push(p);});
  const showGroups=activeFilter==='All'&&!activeStatus;
  el.className='content'+(view==='list'?' list-view':'');
  if(showGroups){
    el.innerHTML=`<div class="stats-row">
      <div class="stat-card"><div class="stat-num">${projects.length}</div><div class="stat-label">Total</div></div>
      <div class="stat-card"><div class="stat-num">${projects.filter(p=>p.status==='active').length}</div><div class="stat-label">Active</div></div>
      <div class="stat-card"><div class="stat-num">${projects.filter(p=>p.status==='paused').length}</div><div class="stat-label">Paused</div></div>
      <div class="stat-card"><div class="stat-num">${Object.keys(byGroup).length}</div><div class="stat-label">Groups</div></div>
    </div>${Object.entries(byGroup).map(([g,ps])=>groupHTML(g,ps)).join('')}`;
  } else {
    el.innerHTML=`<div class="cards-grid">${filtered.map(p=>cardHTML(p)).join('')}</div>`;
  }
}
function groupHTML(g,ps){
  const color=groupColor(g),col=collapsed[g];
  return `<div class="group-section"><div class="group-header" onclick="toggleGroup('${g}')"><span class="group-dot-lg" style="background:${color};box-shadow:0 0 8px ${color}44"></span><span class="group-title">${g}</span><span class="group-ct">${ps.length}</span><span class="chevron ${col?'up':''}">&#9662;</span></div>${col?'':`<div class="cards-grid">${ps.map(p=>cardHTML(p)).join('')}</div>`}</div>`;
}
function cardHTML(p){
  const color=groupColor(p.group_name),ht=HT[p.host]||'',hc=HOST_COLORS[ht]||'var(--text3)';
  const short=(p.url||'').replace(/^https?:\/\//,'').replace(/^file:\/\/\//,'').replace(/\/$/,'');
  return `<div class="card ${selectedId===p.id?'selected':''}" onclick="openPanel(${p.id})">
    <div class="card-color-bar" style="background:linear-gradient(90deg,${color},${color}00)"></div>
    <div class="card-inner">
      <div class="card-top">
        <div class="card-icon" style="background:${color}12">${icon(p.icon)}</div>
        <div style="min-width:0;flex:1">
          <div class="card-name">${p.name}</div>
          <div class="card-desc">${p.description||''}</div>
        </div>
      </div>
      <div class="card-bottom">
        ${p.host?`<span class="card-host"><span class="card-host-dot" style="background:${hc}"></span>${p.host}</span>`:''}
        ${p.status&&p.status!=='active'?`<span class="card-status ${p.status}">${p.status}</span>`:''}
        <span class="card-url-text">${short}</span>
      </div>
    </div>
  </div>`;
}
function toggleGroup(g){collapsed[g]=!collapsed[g];renderContent();}

function openPanel(id){
  const p=projects.find(x=>x.id===id);if(!p)return;
  selectedId=id;renderContent();
  const color=groupColor(p.group_name),isHttp=(p.url||'').startsWith('http'),deps=p.deps?p.deps.split(',').map(d=>d.trim()).filter(Boolean):[];
  let links=[];try{links=JSON.parse(p.links||'[]');}catch{}
  const shortUrl=(p.url||'').replace(/^https?:\/\//,'').replace(/\/$/,'');

  document.getElementById('panel').innerHTML=`
    <div class="panel-hero">
      <div class="panel-hero-gradient" style="background:linear-gradient(135deg,${color},transparent)"></div>
      <button class="panel-hero-close" onclick="closePanel()">&#10005;</button>
      <div class="panel-hero-content">
        <div class="panel-hero-icon" style="background:${color}18;border:1px solid ${color}30">${icon(p.icon)}</div>
        <div class="panel-hero-name">${p.name}</div>
        <div class="panel-hero-meta">
          <span class="card-status ${p.status||'active'}">${p.status||'active'}</span>
          <span style="color:var(--text3);font-size:12px;font-weight:500">${p.group_name}</span>
          ${p.host?`<span style="color:var(--text3);font-size:12px">&#8226; ${p.host}</span>`:''}
        </div>
        ${p.description?`<div class="panel-hero-desc">${p.description}</div>`:''}
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-actions">
        ${isHttp?`<a class="panel-act panel-act-open" href="${p.url}" target="_blank">&#9654; Open Project</a>`:''}
        <div class="panel-act panel-act-secondary" onclick="openEditModal(${p.id})">&#9998; Edit</div>
        ${p.live_url&&p.live_url!==p.url?`<a class="panel-act panel-act-secondary" href="${p.live_url}" target="_blank">&#127760; Live Page</a>`:''}
        <div class="panel-act panel-act-secondary" onclick="copyUrl(${p.id})">&#128203; Copy URL</div>
      </div>
    </div>

    ${links.length?`<div class="panel-section">
      <div class="panel-section-title">Quick Links</div>
      ${links.map(l=>{const s=l.url.replace(/^https?:\/\//,'').replace(/\/$/,'');return `<a class="panel-link" href="${l.url}" target="_blank">
        <div class="panel-link-icon" style="background:${color}12;color:${color}">&#8599;</div>
        <div class="panel-link-info"><div class="panel-link-name">${l.label}</div><div class="panel-link-url">${s}</div></div>
        <span class="panel-link-go">&#8250;</span>
      </a>`;}).join('')}
    </div>`:''}

    <div class="panel-section">
      <div class="panel-section-title">Details</div>
      <div class="panel-pills">
        <div class="panel-pill"><div class="panel-pill-label">Host</div><div class="panel-pill-val">${p.host||'—'}</div></div>
        <div class="panel-pill"><div class="panel-pill-label">Group</div><div class="panel-pill-val">${p.group_name}</div></div>
        ${p.url?`<div class="panel-pill panel-pill-full"><div class="panel-pill-label">URL</div><div class="panel-pill-val">${isHttp?`<a href="${p.url}" target="_blank">${shortUrl}</a>`:p.url}</div></div>`:''}
      </div>
    </div>

    ${p.cf_user||p.cf_token?`<div class="panel-section">
      <div class="panel-section-title">Cloudflare</div>
      <div class="panel-pills">
        ${p.cf_user?`<div class="panel-pill panel-pill-full"><div class="panel-pill-label">Account</div><div class="panel-pill-val">${p.cf_user}</div></div>`:''}
        ${p.cf_token?`<div class="panel-pill panel-pill-full"><div class="panel-pill-label">API Token</div><div class="panel-token" onclick="copyToken('${p.cf_token}')">${p.cf_token.slice(0,24)}... click to copy</div></div>`:''}
      </div>
    </div>`:''}

    ${deps.length?`<div class="panel-section"><div class="panel-section-title">Dependencies</div><div class="deps-wrap">${deps.map(d=>`<span class="tag">${d}</span>`).join('')}</div></div>`:''}
    ${p.notes?`<div class="panel-section"><div class="panel-section-title">Notes</div><div class="panel-notes">${p.notes}</div></div>`:''}

    <div class="panel-footer"><span style="flex:1"></span><button class="btn btn-danger" onclick="deleteProject(${p.id})">Delete Project</button></div>`;

  document.getElementById('panel').classList.add('open');
  document.getElementById('panel-overlay').classList.add('open');
}
function closePanel(){selectedId=null;document.getElementById('panel').classList.remove('open');document.getElementById('panel-overlay').classList.remove('open');renderContent();}
function copyToken(t){navigator.clipboard.writeText(t);toast('Token copied!');}
function copyUrl(id){const p=projects.find(x=>x.id===id);if(p){navigator.clipboard.writeText(p.url||'');toast('URL copied!');}}

function formHTML(p){
  const v=p||{};
  return `<div class="form-row"><label class="form-label">Project Name *</label><input class="form-input" id="f-name" value="${v.name||''}" placeholder="My Project"/></div>
    <div class="form-row"><label class="form-label">Description</label><input class="form-input" id="f-desc" value="${v.description||''}" placeholder="What does this do?"/></div>
    <div class="form-row-2"><div class="form-row" style="margin-bottom:0"><label class="form-label">Group</label><select class="form-input" id="f-group" onchange="if(this.value==='__other__'){this.style.display='none';document.getElementById('f-group-other').style.display='block';document.getElementById('f-group-other').focus();}">${[...new Set(projects.map(p=>p.group_name))].filter(Boolean).map(g=>`<option ${v.group_name===g?'selected':''}>${g}</option>`).join('')}<option value="__other__">+ New group...</option></select><input class="form-input" id="f-group-other" style="display:none;margin-top:6px" placeholder="Enter new group name"/></div>
    <div class="form-row" style="margin-bottom:0"><label class="form-label">Icon</label><input class="form-input" id="f-icon" value="${v.icon||''}" placeholder="emoji or [tag]"/></div></div>
    <div class="form-row" style="margin-top:14px"><label class="form-label">Project URL</label><input class="form-input" id="f-url" value="${v.url||''}" placeholder="https://..."/></div>
    <div class="form-row"><label class="form-label">Live Page URL</label><input class="form-input" id="f-live" value="${v.live_url||''}" placeholder="https://myapp.pages.dev"/></div>
    <div class="form-row"><label class="form-label">Additional Links</label><div id="f-links">${(()=>{try{const lnks=JSON.parse(v.links||'[]');return lnks.map((l,i)=>`<div style="display:flex;gap:6px;margin-bottom:6px" class="link-row"><input class="form-input" style="flex:1" value="${l.label||''}" placeholder="Label"/><input class="form-input" style="flex:2" value="${l.url||''}" placeholder="https://..."/><button type="button" class="btn btn-danger" style="padding:4px 8px;font-size:11px" onclick="this.parentElement.remove()">&#10005;</button></div>`).join('');}catch{return '';}})()}</div><button type="button" class="btn btn-ghost" style="font-size:11px;margin-top:4px" onclick="addLinkRow()">+ Add link</button></div>
    <div class="form-row-2"><div class="form-row" style="margin-bottom:0"><label class="form-label">Host</label><input class="form-input" id="f-host" value="${v.host||''}" placeholder="Cloudflare Pages"/></div>
    <div class="form-row" style="margin-bottom:0"><label class="form-label">Status</label><select class="form-input" id="f-status">${['active','paused','archived'].map(s=>`<option ${(v.status||'active')===s?'selected':''}>${s}</option>`).join('')}</select></div></div>
    <div class="form-row" style="margin-top:14px"><label class="form-label">Cloudflare Account</label><input class="form-input" id="f-cfuser" value="${v.cf_user||''}" placeholder="email@example.com"/></div>
    <div class="form-row"><label class="form-label">Cloudflare API Token</label><input class="form-input" id="f-cftoken" value="${v.cf_token||''}" placeholder="Token..."/></div>
    <div class="form-row"><label class="form-label">Dependencies</label><input class="form-input" id="f-deps" value="${v.deps||''}" placeholder="React, Vite, Wrangler"/></div>
    <div class="form-row"><label class="form-label">Resume Notes</label><textarea class="form-input" id="f-notes" rows="3" placeholder="What do I need to know to continue?">${v.notes||''}</textarea></div>`;
}
function addLinkRow(){const c=document.getElementById('f-links');const d=document.createElement('div');d.style='display:flex;gap:6px;margin-bottom:6px';d.className='link-row';d.innerHTML=`<input class="form-input" style="flex:1" placeholder="Label"/><input class="form-input" style="flex:2" placeholder="https://..."/><button type="button" class="btn btn-danger" style="padding:4px 8px;font-size:11px" onclick="this.parentElement.remove()">&#10005;</button>`;c.appendChild(d);}
function getFormData(){const gsel=document.getElementById('f-group').value;const gother=document.getElementById('f-group-other').value.trim();const gname=gsel==='__other__'&&gother?gother:gsel;const linkRows=document.querySelectorAll('#f-links .link-row');const links=[];linkRows.forEach(r=>{const inputs=r.querySelectorAll('input');const label=inputs[0].value.trim();const url=inputs[1].value.trim();if(label&&url)links.push({label,url});});return{name:document.getElementById('f-name').value.trim(),description:document.getElementById('f-desc').value.trim(),group_name:gname,icon:document.getElementById('f-icon').value.trim()||'[?]',url:document.getElementById('f-url').value.trim(),live_url:document.getElementById('f-live').value.trim()||null,host:document.getElementById('f-host').value.trim(),status:document.getElementById('f-status').value,cf_user:document.getElementById('f-cfuser').value.trim()||null,cf_token:document.getElementById('f-cftoken').value.trim()||null,deps:document.getElementById('f-deps').value.trim()||null,notes:document.getElementById('f-notes').value.trim()||null,links:links.length?JSON.stringify(links):null};}

function openAddModal(){editingId=null;document.getElementById('modal-title').textContent='Add Project';document.getElementById('modal-body').innerHTML=formHTML(null);document.getElementById('modal-footer').innerHTML=`<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveProject()">Save Project</button>`;document.getElementById('modal-overlay').classList.add('open');}
function openEditModal(id){const p=projects.find(x=>x.id===id);if(!p)return;editingId=id;document.getElementById('modal-title').textContent='Edit Project';document.getElementById('modal-body').innerHTML=formHTML(p);document.getElementById('modal-footer').innerHTML=`<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveProject()">Save Changes</button>`;document.getElementById('modal-overlay').classList.add('open');}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}

async function saveProject(){
  const data=getFormData();if(!data.name){toast('Name is required');return;}
  try{
    if(editingId){const r=await fetch(`${API}/projects/${editingId}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});const u=await r.json();projects=projects.map(p=>p.id===editingId?{...u,id:editingId}:p);toast('Project updated!');closeModal();openPanel(editingId);}
    else{const r=await fetch(`${API}/projects`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});const c=await r.json();projects.push(c);toast('Project added!');closeModal();}
    updateCounts();renderContent();
  }catch(e){toast('Error saving project');}
}
async function deleteProject(id){
  if(!confirm('Delete this project?'))return;
  try{await fetch(`${API}/projects/${id}`,{method:'DELETE'});projects=projects.filter(p=>p.id!==id);closePanel();updateCounts();renderContent();toast('Project deleted.');}
  catch(e){toast('Error deleting');}
}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}
async function triggerDeploy(){
  const btn=document.getElementById('deploy-btn'),lbl=document.getElementById('deploy-label');
  if(btn.disabled)return;btn.disabled=true;lbl.textContent='Deploying...';
  try{const r=await fetch(`${API}/deploy`,{method:'POST'});const d=await r.json();toast(d.triggered?'Deploy triggered!':'Error: '+(d.error||'failed'));}catch(e){toast('Deploy failed');}
  setTimeout(()=>{btn.disabled=false;lbl.innerHTML='&#9654; Deploy';},4000);
}

initTheme();load();
</script>
</body>
</html>
